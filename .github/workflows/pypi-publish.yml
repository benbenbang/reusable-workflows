name: publish

on:
  workflow_call:
    inputs:
      python-version:
        default: "3.13"
        description: "setup python action version"
        required: false
        type: string
      twine-version:
        default: "4.0.2"
        description: "twine version to build & publish package"
        required: false
        type: string
      poetry-version:
        default: "1.5.1"
        description: "poetry version to publish package"
        required: false
        type: string

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: install dependencies
        run: |
          python -m pip install --user pipx
          python -m pipx ensurepath
          pipx install poetry=="${poetry_version}"
          poetry install
          pip install --force-reinstall --no-cache-dir twine==${twine_version}
          poetry show
        env:
          poetry_version: ${{ inputs.poetry-version }}
          twine_version: ${{ inputs.twine-version }}

      - name: extract tag name
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: build with poetry
        run: |
          echo "build with release version: ${TAG_NAME}"
          pipx run poetry version ${TAG_NAME} || echo "toml is already up to date."
          pipx run poetry build

      - name: publish to pypi
        env:
          PYPI_USERNAME: ${{ secrets.PYPI_USERNAME }}
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          pipx run poetry publish -u ${PYPI_USERNAME} -p $PYPI_TOKEN

      - name: update title  && upload distribution to GitHub Release
        run: |
          gh release edit "${TAG_NAME}" --title "Types Confluent Kafka ${TAG_NAME}"
          gh release upload ${TAG_NAME} dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_ACTION }}
