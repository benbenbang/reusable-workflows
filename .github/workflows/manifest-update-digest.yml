name: create manifest and trigger update digest

on:
  workflow_call:
    inputs:
      app_type:
        type: string
        description: "type of the app: backend or frontend"
        required: true
      app_name:
        type: string
        description: name of the application
        required: true
      app_image_sha:
        type: string
        description: sha of the app image
        required: true
      repo:
        type: string
        description: repo name to be called
        required: false
        default: coldbrew-recipe

jobs:
  update-manifest-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: generate app token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.TECHNICAL_APP_APP_ID  }}
          private-key: ${{ secrets.TECHNICAL_APP_PEM }}
          owner: ${{ github.repository_owner }}
      - name: trigger update digest
        run: |
          echo "going to trigger downstream: ${REPO}"
          echo "using app type: ${APP_TYPE}"
          echo "using app name: ${APP_NAME}"
          echo "using app image sha: ${IMAGE_SHA}"

          curl -L \
               -X POST \
               -H "Accept: application/vnd.github+json" \
               -H "Authorization: Bearer ${{ steps.generate_token.outputs.token }}" \
               -H "X-GitHub-Api-Version: 2022-11-28" \
               https://api.github.com/repos/${OWNER}/${REPO}/dispatches \
               -d "{
                  \"event_type\": \"update-digest\",
                  \"client_payload\": {
                    \"app_name\": \"${APP_NAME}\",
                    \"app_type\": \"${APP_TYPE}\",
                    \"app_image_sha\": \"${IMAGE_SHA}\"
                  }
               }"
        env:
          APP_TYPE: ${{ inputs.app_type }}
          APP_NAME: ${{ inputs.app_name }}
          IMAGE_SHA: ${{ inputs.app_image_sha }}
          REPO: ${{ inputs.repo }}
          OWNER: ${{ github.repository_owner }}
