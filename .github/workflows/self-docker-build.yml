name: Build r-workflow repo docker image

on:
  workflow_dispatch:
    inputs:
      build-option:
        description: "docker image to build"
        type: choice
        options:
          - pre-commit
          - semantic-release
          - toolkit
      build-runner:
        description: "runner to use for arm64 builds"
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-latest-arm64
          - ubuntu-24.04-arm64
          - ubuntu-22.04-arm64
          - blacksmith-2vcpu-ubuntu-2404-arm
          - blacksmith-2vcpu-ubuntu-2204-arm
        default: ubuntu-latest
      python-image-version:
        description: "docker python image version"
        default: "3.13-slim-bookworm"
        type: string
        required: false
      pre-commit-version:
        description: "pre-commit version"
        default: "4.2.0"
        type: string
      node-image-version:
        description: "docker node image version"
        default: "20.8.1-bookworm"
        required: false
        type: string

permissions:
  packages: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  build-docker-image:
    strategy:
      fail-fast: true
      matrix:
        platform: [amd64, arm64]
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ${{ inputs.build-runner }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: set up qemu
        uses: docker/setup-qemu-action@v3
      - name: set up docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: "--allow-insecure-entitlement security.insecure --allow-insecure-entitlement network.host"
      - name: log into registry ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build docker image
        id: build-image
        run: |
          cd ops/${{ inputs.build-option }}
          docker buildx build \
            --rm \
            --no-cache \
            --platform linux/${{ matrix.platform }} \
            --push \
            -t ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ inputs.build-option }}-${{ matrix.platform }} \
            -t ghcr.io/${{ github.repository_owner }}/${{ inputs.build-option }}-${{ matrix.platform }} \
            -f Dockerfile \
            .

  create-manifest:
    needs: build-docker-image  # Wait for ALL matrix jobs to complete
    runs-on: ubuntu-latest
    steps:
      - name: log into registry ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: create multi-arch manifest
        run: |
          docker buildx imagetools create -t \
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ inputs.build-option }} \
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ inputs.build-option }}-amd64 \
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ inputs.build-option }}-arm64
